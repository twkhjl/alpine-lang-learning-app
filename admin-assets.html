<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>媒體資產 - LingoCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="public/assets/css/admin.css" />
  </head>
  <body class="admin-page" data-admin-page="admin-assets.html" style="visibility: hidden;">
    <div class="admin-shell">
      <aside class="admin-sidebar" data-admin-sidebar></aside>
      <div class="admin-content">
        <header class="admin-topbar">
          <div class="admin-topbar-title">
            <h2>媒體資產</h2>
            <p>直接查看 Cloudflare R2 物件、刪除單一資產，或清空整個 bucket。</p>
          </div>
          <div class="admin-topbar-user">
            <span class="material-symbols-outlined">perm_media</span>
            <span data-i18n="shell.userLabel">Admin</span>
          </div>
        </header>
        <main class="admin-main">
          <section class="admin-page-header">
            <div>
              <h1>媒體資產</h1>
              <p>這裡顯示的是 R2 內實際存在的檔案，不只是資料庫中的 reference。</p>
            </div>
            <div class="admin-actions">
              <button class="admin-button secondary" type="button" data-assets-reload>重新整理 R2</button>
            </div>
          </section>

          <section class="admin-card" style="padding: 18px; display: grid; gap: 18px;">
            <div class="admin-tab-row">
              <a class="active" href="#" data-asset-type="">全部</a>
              <a href="#" data-asset-type="image">圖片</a>
              <a href="#" data-asset-type="audio">音檔</a>
            </div>
            <div class="admin-filters" style="padding: 0; grid-template-columns: minmax(220px, 1fr) minmax(160px, 0.8fr) auto;">
              <div class="admin-field">
                <label for="asset-search">搜尋物件 key</label>
                <input id="asset-search" type="search" placeholder="例如 audios/id/28.mp3" />
              </div>
              <div class="admin-field">
                <label for="lang-filter">語言</label>
                <select id="lang-filter">
                  <option value="">全部語言</option>
                  <option value="zh-TW">zh-TW</option>
                  <option value="id">id</option>
                  <option value="en">en</option>
                </select>
              </div>
              <div class="admin-status-text" data-assets-status>正在讀取 R2 物件...</div>
            </div>
          </section>

          <section class="admin-asset-layout">
            <div class="admin-stack">
              <section class="admin-card" style="padding: 18px;">
                <div class="admin-asset-grid" data-assets-cards>
                  <div class="admin-empty-state">正在讀取圖片...</div>
                </div>
              </section>
              <section class="admin-card">
                <div class="admin-table-wrap">
                  <table class="admin-table">
                    <thead>
                      <tr>
                        <th>Object Key</th>
                        <th>類型</th>
                        <th>語言</th>
                        <th>大小</th>
                        <th>上傳時間</th>
                        <th>資料庫</th>
                        <th>操作</th>
                      </tr>
                    </thead>
                    <tbody data-assets-table-body>
                      <tr>
                        <td colspan="7"><div class="admin-empty-state">正在讀取物件...</div></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </section>
            </div>

            <aside class="admin-card admin-drawer">
              <h2>危險操作</h2>
              <p>清空整個 bucket 會刪除所有舊圖片與音檔，並同步清空單字的 `image_url` 與 `audio_filename`。</p>
              <p>請先在下方輸入確認字串，再執行 purge。</p>
              <div class="admin-form-grid" style="grid-template-columns: 1fr; margin-top: 8px;">
                <div class="admin-field">
                  <label for="assets-purge-confirm">確認字串</label>
                  <input id="assets-purge-confirm" placeholder="DELETE ALL R2 OBJECTS" />
                </div>
                <button class="admin-button danger" type="button" data-assets-purge>清空整個 R2 Bucket</button>
              </div>
            </aside>
          </section>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public/assets/js/supabase-config.js"></script>
    <script src="public/assets/js/admin-i18n.js"></script>
    <script src="public/assets/js/admin-shell.js"></script>
    <script src="public/assets/js/admin-auth.js"></script>
    <script src="public/assets/js/admin-api.js"></script>
    <script src="public/assets/js/admin-assets.js"></script>
  </body>
</html>
