<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>素材參考 - LingoCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="public/assets/css/admin.css" />
  </head>
  <body class="admin-page" data-admin-page="admin-assets.html" style="visibility: hidden;">
    <div class="admin-shell">
      <aside class="admin-sidebar" data-admin-sidebar></aside>
      <div class="admin-content">
        <header class="admin-topbar">
          <div class="admin-topbar-title">
            <h2 data-i18n="assets.header.title">素材參考</h2>
            <p data-i18n="assets.header.description">瀏覽圖片與音檔引用關係，並確認資料庫中的 stored path。</p>
          </div>
          <div class="admin-topbar-user">
            <span class="material-symbols-outlined">perm_media</span>
            <span data-i18n="shell.userLabel">管理員</span>
          </div>
        </header>
        <main class="admin-main">
          <section class="admin-page-header">
            <div>
              <h1 data-i18n="assets.header.title">素材參考</h1>
              <p data-i18n="assets.header.description">瀏覽圖片與音檔引用關係，並確認資料庫中的 stored path。</p>
            </div>
            <button class="admin-button secondary" type="button" disabled data-i18n="assets.uploadSoon">上傳功能即將推出</button>
          </section>

          <section class="admin-card" style="padding: 18px; display: grid; gap: 18px;">
            <div class="admin-tab-row">
              <a class="active" href="#" data-asset-type="" data-i18n="assets.tabs.all">全部</a>
              <a href="#" data-asset-type="image" data-i18n="assets.tabs.image">圖片</a>
              <a href="#" data-asset-type="audio" data-i18n="assets.tabs.audio">音檔</a>
            </div>
            <div class="admin-filters" style="padding: 0; grid-template-columns: minmax(220px, 1fr) minmax(160px, 0.8fr) auto;">
              <div class="admin-field">
                <label for="asset-search" data-i18n="assets.search.label">搜尋 stored path</label>
                <input id="asset-search" type="search" data-i18n-placeholder="assets.search.placeholder" placeholder="例如 audios/id/meja.mp3" />
              </div>
              <div class="admin-field">
                <label for="lang-filter" data-i18n="assets.language.label">語言</label>
                <select id="lang-filter">
                  <option value="" data-i18n="assets.language.all">全部語言</option>
                  <option value="zh-TW">zh-TW</option>
                  <option value="id">id</option>
                  <option value="en">en</option>
                </select>
              </div>
              <div class="admin-status-text" data-assets-status data-i18n="assets.status.loading">載入素材參考中...</div>
            </div>
          </section>

          <section class="admin-asset-layout">
            <div class="admin-stack">
              <section class="admin-card" style="padding: 18px;">
                <div class="admin-asset-grid" data-assets-cards>
                  <div class="admin-empty-state" data-i18n="common.loading">載入中...</div>
                </div>
              </section>
              <section class="admin-card">
                <div class="admin-table-wrap">
                  <table class="admin-table">
                    <thead>
                      <tr>
                        <th data-i18n="assets.table.path">Stored Path</th>
                        <th data-i18n="assets.table.language">語言</th>
                        <th data-i18n="assets.table.type">類型</th>
                        <th data-i18n="assets.table.references">引用字詞</th>
                      </tr>
                    </thead>
                    <tbody data-assets-table-body>
                      <tr>
                        <td colspan="4"><div class="admin-empty-state" data-i18n="common.loading">載入中...</div></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </section>
            </div>

            <aside class="admin-card admin-drawer">
              <h2 data-i18n="assets.drawer.title">使用說明</h2>
              <p data-i18n="assets.drawer.body1">目前顯示的是資料庫中的 stored path。</p>
              <p data-i18n="assets.drawer.body2">你可以確認哪些字詞正在引用這個素材。</p>
              <p data-i18n="assets.drawer.body3">這個頁面暫時不提供 R2 實體檔案管理。</p>
            </aside>
          </section>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public/assets/js/supabase-config.js"></script>
    <script src="public/assets/js/admin-i18n.js"></script>
    <script src="public/assets/js/admin-shell.js"></script>
    <script src="public/assets/js/admin-auth.js"></script>
    <script src="public/assets/js/admin-api.js"></script>
    <script src="public/assets/js/admin-assets.js"></script>
  </body>
</html>
