<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理員登入 - LingoCMS</title>
    <link rel="stylesheet" href="public/assets/css/admin.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public/assets/js/supabase-config.js"></script>
  </head>
  <body class="admin-page admin-login-page" data-admin-page="admin-login.html">
    <div class="admin-login-switcher">
      <button class="admin-language-button active" type="button" data-admin-locale="zh-TW">繁中</button>
      <button class="admin-language-button" type="button" data-admin-locale="en">EN</button>
    </div>
    <main class="admin-login-layout">
      <section class="admin-login-brand">
        <div class="admin-brand">
          <h1>LingoCMS</h1>
          <p data-i18n="shell.brand.tagline">Lexicon admin workspace</p>
        </div>
        <div>
          <h1 data-i18n="login.brand.title">管理員登入</h1>
          <h2 data-i18n="login.brand.heading">管理員工作區</h2>
          <p data-i18n="login.brand.body">使用管理員帳密登入後，系統會透過受保護的 API 寫入 Supabase session，並驗證是否具有 admin 權限。</p>
        </div>
        <div class="admin-topbar-user">
          <span class="material-symbols-outlined">lock</span>
          <span data-i18n="login.brand.status">登入成功後會自動導向後台頁面</span>
        </div>
      </section>
      <section class="admin-login-card-wrap">
        <div class="admin-login-card">
          <div class="admin-brand">
            <h1>LingoCMS Admin</h1>
            <p data-i18n="login.brand.heading">管理員工作區</p>
          </div>
          <form class="admin-login-form" action="#" method="post" novalidate>
            <div class="admin-field">
              <label for="admin-username" data-i18n="login.form.username">使用者名稱</label>
              <input id="admin-username" name="username" type="text" placeholder="admin" autocomplete="username" required />
            </div>
            <div class="admin-field">
              <label for="admin-password" data-i18n="login.form.password">密碼</label>
              <input id="admin-password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <div class="admin-help-text">
              <div data-i18n="login.actions.autoRedirect">登入後會自動前往後台首頁</div>
              <div data-i18n="login.actions.noDirectOpen">請勿直接開啟受保護頁面</div>
            </div>
            <button class="admin-button" type="submit" data-i18n="login.button.submit">登入管理員</button>
          </form>
          <p id="admin-login-message" class="admin-status-text" role="status" aria-live="polite" data-i18n="login.defaultMessage">請輸入管理員帳號密碼以存取後台。</p>
        </div>
      </section>
    </main>

    <script src="public/assets/js/admin-i18n.js"></script>
    <script src="public/assets/js/admin-shell.js"></script>
    <script src="public/assets/js/admin-auth.js"></script>
    <script src="public/assets/js/admin-login.js"></script>
  </body>
</html>
