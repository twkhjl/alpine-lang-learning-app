<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>標籤管理 - LingoCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="public/assets/css/admin.css" />
  </head>
  <body class="admin-page" data-admin-page="admin-tags.html" style="visibility: hidden;">
    <div class="admin-shell">
      <aside class="admin-sidebar" data-admin-sidebar></aside>
      <div class="admin-content">
        <header class="admin-topbar">
          <div class="admin-topbar-title">
            <h2 data-i18n="tags.header.title">標籤管理</h2>
            <p data-i18n="tags.header.description">維護 taxonomy 標籤與多語名稱。</p>
          </div>
          <div class="admin-topbar-user">
            <span class="material-symbols-outlined">sell</span>
            <span data-i18n="shell.userLabel">管理員</span>
          </div>
        </header>
        <main class="admin-main">
          <section class="admin-page-header">
            <div>
              <h1 data-i18n="tags.header.title">標籤管理</h1>
              <p data-i18n="tags.header.description">維護 taxonomy 標籤與多語名稱。</p>
            </div>
            <button class="admin-button" type="button" data-tag-create data-i18n="tags.actions.create">新增標籤</button>
          </section>

          <section class="admin-card">
            <div class="admin-table-footer">
              <div class="admin-help-text" data-tags-summary>--</div>
              <div class="admin-status-text" data-tags-status data-i18n="tags.status.loading">載入標籤中...</div>
            </div>
            <div class="admin-table-wrap">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th data-i18n="tags.table.id">ID</th>
                    <th data-i18n="tags.table.icon">圖示</th>
                    <th data-i18n="tags.table.zhTw">繁中</th>
                    <th data-i18n="tags.table.idName">印尼文</th>
                    <th data-i18n="tags.table.en">英文</th>
                    <th data-i18n="tags.table.usage">使用數</th>
                    <th data-i18n="tags.table.actions">操作</th>
                  </tr>
                </thead>
                <tbody data-tags-table-body>
                  <tr>
                    <td colspan="7"><div class="admin-empty-state" data-i18n="common.loading">載入中...</div></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>

    <div class="admin-modal-backdrop" hidden>
      <section class="admin-modal" aria-label="Tag editor">
        <header>
          <strong data-tag-modal-title data-i18n="tags.modal.create">新增標籤</strong>
          <span class="admin-help-text">Taxonomy</span>
        </header>
        <div class="admin-modal-body">
          <div class="admin-field">
            <label for="tag-id" data-i18n="tags.form.idReadonly">標籤 ID</label>
            <input id="tag-id" readonly />
          </div>
          <div class="admin-field">
            <label for="tag-icon" data-i18n="tags.form.icon">圖示</label>
            <input id="tag-icon" value="sell" />
          </div>
          <div class="admin-field">
            <label for="tag-zh" data-i18n="tags.form.zhTw">繁中名稱</label>
            <input id="tag-zh" />
          </div>
          <div class="admin-field">
            <label for="tag-idn" data-i18n="tags.form.id">印尼文名稱</label>
            <input id="tag-idn" />
          </div>
          <div class="admin-field">
            <label for="tag-en" data-i18n="tags.form.en">英文名稱</label>
            <input id="tag-en" />
          </div>
        </div>
        <footer>
          <button class="admin-button secondary" type="button" data-tag-cancel data-i18n="tags.modal.cancel">取消</button>
          <button class="admin-button" type="button" data-tag-save data-i18n="tags.modal.save">儲存</button>
        </footer>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public/assets/js/supabase-config.js"></script>
    <script src="public/assets/js/admin-i18n.js"></script>
    <script src="public/assets/js/admin-shell.js"></script>
    <script src="public/assets/js/admin-auth.js"></script>
    <script src="public/assets/js/admin-api.js"></script>
    <script src="public/assets/js/admin-tags.js"></script>
  </body>
</html>
