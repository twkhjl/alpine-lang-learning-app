<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>編輯字詞 - LingoCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="public/assets/css/admin.css" />
  </head>
  <body class="admin-page" data-admin-page="admin-word-edit.html" style="visibility: hidden;">
    <div class="admin-shell">
      <aside class="admin-sidebar" data-admin-sidebar></aside>
      <div class="admin-content">
        <header class="admin-topbar">
          <div class="admin-topbar-title">
            <h2 data-word-edit-title data-i18n="wordEdit.header.editTitle">編輯字詞</h2>
            <p data-word-edit-description data-i18n="wordEdit.header.editDescription">編輯字詞內容、發音、音檔與標籤。</p>
          </div>
          <div class="admin-topbar-user">
            <span class="material-symbols-outlined">edit_square</span>
            <span data-i18n="shell.userLabel">管理員</span>
          </div>
        </header>
        <main class="admin-main">
          <section class="admin-page-header">
            <div>
              <h1 data-word-edit-title data-i18n="wordEdit.header.editTitle">編輯字詞</h1>
              <p data-word-edit-description data-i18n="wordEdit.header.editDescription">編輯字詞內容、發音、音檔與標籤。</p>
            </div>
            <div class="admin-actions">
              <button class="admin-button secondary" type="button" data-word-cancel data-i18n="wordEdit.actions.cancel">回到列表</button>
              <button class="admin-button" type="button" data-word-save data-i18n="wordEdit.actions.save">儲存變更</button>
            </div>
          </section>

          <section class="admin-word-grid">
            <div class="admin-stack">
              <article class="admin-card admin-form-card">
                <div class="admin-form-grid">
                  <div class="admin-field">
                    <label for="word-id" data-i18n="wordEdit.fields.wordId">字詞 ID</label>
                    <input id="word-id" readonly />
                  </div>
                  <div class="admin-field">
                    <label for="image-url" data-i18n="wordEdit.fields.imageUrl">圖片路徑或 URL</label>
                    <input id="image-url" />
                  </div>
                  <div class="admin-field">
                    <label for="zh-word" data-i18n="wordEdit.fields.zhTw">繁中</label>
                    <input id="zh-word" />
                  </div>
                  <div class="admin-field">
                    <label for="pron-zh" data-i18n="wordEdit.fields.pronunciationZhTw">繁中發音</label>
                    <input id="pron-zh" />
                  </div>
                  <div class="admin-field">
                    <label for="audio-zh" data-i18n="wordEdit.fields.audioZhTw">繁中音檔</label>
                    <input id="audio-zh" />
                  </div>
                  <div class="admin-field"></div>
                  <div class="admin-field">
                    <label for="id-word" data-i18n="wordEdit.fields.id">印尼文</label>
                    <input id="id-word" />
                  </div>
                  <div class="admin-field">
                    <label for="pron-id" data-i18n="wordEdit.fields.pronunciationId">印尼文發音</label>
                    <input id="pron-id" />
                  </div>
                  <div class="admin-field">
                    <label for="audio-id" data-i18n="wordEdit.fields.audioId">印尼文音檔</label>
                    <input id="audio-id" />
                  </div>
                  <div class="admin-field"></div>
                  <div class="admin-field">
                    <label for="en-word" data-i18n="wordEdit.fields.en">英文</label>
                    <input id="en-word" />
                  </div>
                  <div class="admin-field">
                    <label for="pron-en" data-i18n="wordEdit.fields.pronunciationEn">英文發音</label>
                    <input id="pron-en" />
                  </div>
                  <div class="admin-field">
                    <label for="audio-en" data-i18n="wordEdit.fields.audioEn">英文音檔</label>
                    <input id="audio-en" />
                  </div>
                </div>
              </article>
            </div>

            <aside class="admin-stack">
              <article class="admin-card admin-form-card">
                <h3 data-i18n="wordEdit.fields.tags">標籤</h3>
                <div class="admin-chip-row" data-tag-options style="margin-top: 16px;">
                  <div class="admin-empty-state" data-i18n="common.loading">載入中...</div>
                </div>
              </article>
              <article class="admin-card admin-form-card">
                <h3>Status</h3>
                <p class="admin-status-text" data-word-edit-status data-i18n="wordEdit.status.loading">載入字詞中...</p>
              </article>
            </aside>
          </section>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public/assets/js/supabase-config.js"></script>
    <script src="public/assets/js/admin-i18n.js"></script>
    <script src="public/assets/js/admin-shell.js"></script>
    <script src="public/assets/js/admin-auth.js"></script>
    <script src="public/assets/js/admin-api.js"></script>
    <script src="public/assets/js/admin-word-edit.js"></script>
  </body>
</html>
