<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>單字編輯 - LingoCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="public/assets/css/admin.css" />
  </head>
  <body class="admin-page" data-admin-page="admin-word-edit.html" style="visibility: hidden;">
    <div class="admin-shell">
      <aside class="admin-sidebar" data-admin-sidebar></aside>
      <div class="admin-content">
        <header class="admin-topbar">
          <div class="admin-topbar-title">
            <h2 data-word-edit-title>單字編輯</h2>
            <p data-word-edit-description>先儲存單字，再直接上傳圖片與三語音檔。</p>
          </div>
          <div class="admin-topbar-user">
            <span class="material-symbols-outlined">edit_square</span>
            <span data-i18n="shell.userLabel">Admin</span>
          </div>
        </header>
        <main class="admin-main">
          <section class="admin-page-header">
            <div>
              <h1 data-word-edit-title>單字編輯</h1>
              <p data-word-edit-description>管理翻譯、發音、標籤，並直接維護 R2 圖片與音檔。</p>
            </div>
            <div class="admin-actions">
              <button class="admin-button secondary" type="button" data-word-cancel>返回列表</button>
              <button class="admin-button" type="button" data-word-save>儲存單字</button>
            </div>
          </section>

          <section class="admin-word-grid">
            <div class="admin-stack">
              <article class="admin-card admin-form-card">
                <div class="admin-form-grid">
                  <div class="admin-field">
                    <label for="word-id">單字 ID</label>
                    <input id="word-id" readonly />
                  </div>
                  <div class="admin-field">
                    <label for="image-url">圖片 key</label>
                    <input id="image-url" readonly />
                  </div>
                  <div class="admin-field">
                    <label for="zh-word">繁中</label>
                    <input id="zh-word" />
                  </div>
                  <div class="admin-field">
                    <label for="pron-zh">繁中發音</label>
                    <input id="pron-zh" />
                  </div>
                  <div class="admin-field">
                    <label for="audio-zh">繁中音檔</label>
                    <input id="audio-zh" readonly />
                  </div>
                  <div class="admin-field">
                    <label for="id-word">印尼文</label>
                    <input id="id-word" />
                  </div>
                  <div class="admin-field">
                    <label for="pron-id">印尼文發音</label>
                    <input id="pron-id" />
                  </div>
                  <div class="admin-field">
                    <label for="audio-id">印尼文音檔</label>
                    <input id="audio-id" readonly />
                  </div>
                  <div class="admin-field">
                    <label for="en-word">英文</label>
                    <input id="en-word" />
                  </div>
                  <div class="admin-field">
                    <label for="pron-en">英文發音</label>
                    <input id="pron-en" />
                  </div>
                  <div class="admin-field">
                    <label for="audio-en">英文音檔</label>
                    <input id="audio-en" readonly />
                  </div>
                </div>
              </article>

              <article class="admin-card admin-form-card">
                <div class="admin-section-header" style="padding: 0 0 12px;">
                  <h3>圖片</h3>
                  <span class="admin-status-text" data-image-status>請先儲存單字後再上傳圖片。</span>
                </div>
                <div class="admin-media-panel">
                  <div class="admin-media-preview" data-image-preview>尚未上傳圖片</div>
                  <div class="admin-form-grid">
                    <div class="admin-field full">
                      <label for="image-file">選擇圖片檔</label>
                      <input id="image-file" type="file" accept="image/jpeg,image/png,image/webp" />
                    </div>
                    <div class="admin-actions">
                      <button class="admin-button secondary" type="button" data-image-upload>上傳 / 替換圖片</button>
                      <button class="admin-button danger" type="button" data-image-delete>刪除圖片</button>
                    </div>
                  </div>
                </div>
              </article>

              <article class="admin-card admin-form-card">
                <div class="admin-section-header" style="padding: 0 0 12px;">
                  <h3>音檔</h3>
                  <span class="admin-status-text" data-audio-status>請先儲存單字後再上傳音檔。</span>
                </div>
                <div class="admin-media-audio-grid">
                  <section class="admin-media-audio-card" data-audio-card="zh-TW">
                    <h4>繁中音檔</h4>
                    <p class="admin-media-filename" data-audio-filename="zh-TW">未設定</p>
                    <audio controls preload="none" data-audio-player="zh-TW"></audio>
                    <div class="admin-field">
                      <label for="audio-file-zh">選擇檔案</label>
                      <input id="audio-file-zh" type="file" accept="audio/mpeg,audio/wav,audio/ogg" data-audio-file="zh-TW" />
                    </div>
                    <div class="admin-actions">
                      <button class="admin-button secondary" type="button" data-audio-upload="zh-TW">上傳 / 替換</button>
                      <button class="admin-button danger" type="button" data-audio-delete="zh-TW">刪除音檔</button>
                    </div>
                  </section>

                  <section class="admin-media-audio-card" data-audio-card="id">
                    <h4>印尼文音檔</h4>
                    <p class="admin-media-filename" data-audio-filename="id">未設定</p>
                    <audio controls preload="none" data-audio-player="id"></audio>
                    <div class="admin-field">
                      <label for="audio-file-id">選擇檔案</label>
                      <input id="audio-file-id" type="file" accept="audio/mpeg,audio/wav,audio/ogg" data-audio-file="id" />
                    </div>
                    <div class="admin-actions">
                      <button class="admin-button secondary" type="button" data-audio-upload="id">上傳 / 替換</button>
                      <button class="admin-button danger" type="button" data-audio-delete="id">刪除音檔</button>
                    </div>
                  </section>

                  <section class="admin-media-audio-card" data-audio-card="en">
                    <h4>英文音檔</h4>
                    <p class="admin-media-filename" data-audio-filename="en">未設定</p>
                    <audio controls preload="none" data-audio-player="en"></audio>
                    <div class="admin-field">
                      <label for="audio-file-en">選擇檔案</label>
                      <input id="audio-file-en" type="file" accept="audio/mpeg,audio/wav,audio/ogg" data-audio-file="en" />
                    </div>
                    <div class="admin-actions">
                      <button class="admin-button secondary" type="button" data-audio-upload="en">上傳 / 替換</button>
                      <button class="admin-button danger" type="button" data-audio-delete="en">刪除音檔</button>
                    </div>
                  </section>
                </div>
              </article>
            </div>

            <aside class="admin-stack">
              <article class="admin-card admin-form-card">
                <h3>標籤</h3>
                <div class="admin-chip-row" data-tag-options style="margin-top: 16px;">
                  <div class="admin-empty-state">正在讀取標籤...</div>
                </div>
              </article>
              <article class="admin-card admin-form-card">
                <h3>狀態</h3>
                <p class="admin-status-text" data-word-edit-status>正在讀取單字...</p>
              </article>
            </aside>
          </section>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public/assets/js/supabase-config.js"></script>
    <script src="public/assets/js/admin-i18n.js"></script>
    <script src="public/assets/js/admin-shell.js"></script>
    <script src="public/assets/js/admin-auth.js"></script>
    <script src="public/assets/js/admin-api.js"></script>
    <script src="public/assets/js/admin-word-edit.js"></script>
  </body>
</html>
