<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字詞管理 - LingoCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="public/assets/css/admin.css" />
  </head>
  <body class="admin-page" data-admin-page="admin-words.html" style="visibility: hidden;">
    <div class="admin-shell">
      <aside class="admin-sidebar" data-admin-sidebar></aside>
      <div class="admin-content">
        <header class="admin-topbar">
          <div class="admin-topbar-title">
            <h2 data-i18n="words.header.title">字詞管理</h2>
            <p data-i18n="words.header.description">搜尋、篩選並管理字詞資料。</p>
          </div>
          <div class="admin-topbar-user">
            <span class="material-symbols-outlined">person</span>
            <span data-i18n="shell.userLabel">管理員</span>
          </div>
        </header>
        <main class="admin-main">
          <section class="admin-page-header">
            <div>
              <h1 data-i18n="words.header.title">字詞管理</h1>
              <p data-i18n="words.header.description">搜尋、篩選並管理字詞資料。</p>
            </div>
            <div class="admin-actions">
              <button class="admin-button secondary" type="button" disabled data-i18n="words.csvSoon">CSV 功能即將推出</button>
              <a class="admin-button" data-create-word-link href="admin-word-edit.html?mode=create">
                <span class="material-symbols-outlined">add</span>
                <span data-i18n="words.create">建立字詞</span>
              </a>
            </div>
          </section>

          <section class="admin-card">
            <div class="admin-filters">
              <div class="admin-field">
                <label for="word-search" data-i18n="words.filters.search">搜尋字詞或標籤</label>
                <input id="word-search" type="text" data-i18n-placeholder="words.filters.searchPlaceholder" placeholder="例如 meja、food、桌子" />
              </div>
              <div class="admin-field">
                <label for="tag-filter" data-i18n="words.filters.tag">標籤</label>
                <select id="tag-filter">
                  <option value="" data-i18n="words.filters.unset">全部</option>
                </select>
              </div>
              <div class="admin-field">
                <label for="image-filter" data-i18n="words.filters.image">圖片</label>
                <select id="image-filter">
                  <option value="" data-i18n="words.filters.unset">全部</option>
                  <option value="true" data-i18n="words.filters.hasImage">有圖片</option>
                  <option value="false" data-i18n="words.table.imageMissing">缺少圖片</option>
                </select>
              </div>
              <div class="admin-field">
                <label for="audio-filter" data-i18n="words.filters.audio">音檔</label>
                <select id="audio-filter">
                  <option value="" data-i18n="words.filters.unset">全部</option>
                  <option value="true" data-i18n="words.filters.hasAudio">有音檔</option>
                  <option value="false" data-i18n="words.table.audioMissing">缺少音檔</option>
                </select>
              </div>
              <div class="admin-field">
                <label for="page-size-filter" data-i18n="words.filters.pageSize">每頁筆數</label>
                <select id="page-size-filter">
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                </select>
              </div>
              <div class="admin-status-text" data-words-status data-i18n="words.status.loading">載入字詞中...</div>
            </div>
            <div class="admin-table-wrap">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th data-i18n="words.table.id">ID</th>
                    <th data-i18n="words.table.image">圖片</th>
                    <th data-i18n="words.table.wordZhTw">繁中</th>
                    <th data-i18n="words.table.idText">印尼文</th>
                    <th data-i18n="words.table.en">英文</th>
                    <th data-i18n="words.table.tags">標籤</th>
                    <th data-i18n="words.table.media">媒體</th>
                    <th data-i18n="words.table.updatedAt">更新時間</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody data-words-table-body>
                  <tr>
                    <td colspan="9"><div class="admin-empty-state" data-i18n="common.loading">載入中...</div></td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="admin-table-footer">
              <div class="admin-help-text" data-words-summary>--</div>
              <div class="admin-pagination">
                <button type="button" data-words-prev>&lt;</button>
                <span data-words-page>1 / 1</span>
                <button type="button" data-words-next>&gt;</button>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public/assets/js/supabase-config.js"></script>
    <script src="public/assets/js/admin-i18n.js"></script>
    <script src="public/assets/js/admin-shell.js"></script>
    <script src="public/assets/js/admin-auth.js"></script>
    <script src="public/assets/js/admin-api.js"></script>
    <script src="public/assets/js/admin-words.js"></script>
  </body>
</html>
