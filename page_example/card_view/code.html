<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>單字卡顯示 (Card View) - 隱藏標籤版</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#ffdad6",
                        "surface-container": "#1f1f27",
                        "on-primary-container": "#f4f1ff",
                        "on-tertiary": "#502400",
                        "on-surface": "#e4e1ed",
                        "outline": "#918fa0",
                        "secondary-fixed": "#e2dfff",
                        "inverse-on-surface": "#302f38",
                        "on-secondary-fixed-variant": "#414177",
                        "on-tertiary-container": "#ffefe7",
                        "on-primary-fixed-variant": "#332dbc",
                        "secondary-fixed-dim": "#c2c1ff",
                        "surface-bright": "#393841",
                        "surface-dim": "#13131b",
                        "surface": "#13131b",
                        "on-primary-fixed": "#0c006b",
                        "surface-container-low": "#1b1b23",
                        "surface-container-highest": "#34343d",
                        "inverse-primary": "#4d4ad5",
                        "tertiary-fixed": "#ffdcc6",
                        "error-container": "#93000a",
                        "surface-container-high": "#2a2932",
                        "on-tertiary-fixed": "#311300",
                        "on-secondary": "#2a2a5f",
                        "primary-container": "#5e5ce6",
                        "primary-fixed-dim": "#c2c1ff",
                        "on-tertiary-fixed-variant": "#723600",
                        "tertiary": "#ffb786",
                        "secondary": "#c2c1ff",
                        "on-background": "#e4e1ed",
                        "on-secondary-fixed": "#151449",
                        "primary": "#c2c1ff",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#ffb786",
                        "on-surface-variant": "#c7c4d7",
                        "error": "#ffb4ab",
                        "surface-container-lowest": "#0e0d15",
                        "inverse-surface": "#e4e1ed",
                        "secondary-container": "#43437a",
                        "tertiary-container": "#ae5600",
                        "background": "#13131b",
                        "surface-tint": "#c2c1ff",
                        "on-primary": "#1800a7",
                        "surface-variant": "#34343d",
                        "outline-variant": "#464554",
                        "on-secondary-container": "#b3b3f1",
                        "primary-fixed": "#e2dfff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chinese-char {
            letter-spacing: 0.05em;
        }
        .glass-panel {
            background: rgba(52, 52, 61, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(145, 143, 160, 0.15);
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#13131b]/60 backdrop-blur-xl border-b border-white/5">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#c2c1ff] cursor-pointer hover:opacity-80 active:opacity-60 transition-opacity">menu</span>
<h1 class="font-manrope font-black text-[#c2c1ff] tracking-tighter text-lg">The Lexicon</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#c2c1ff] cursor-pointer hover:opacity-80 active:opacity-60 transition-opacity">translate</span>
</div>
</header>
<main class="pt-20 pb-32 px-6 max-w-2xl mx-auto min-h-screen flex flex-col">
<!-- Spacer where Search Bar would be in List View -->
<div class="h-10 mb-6 invisible"></div>
<!-- View Toggle & Tag Selection (Matched to List View Styles) -->
<section class="mb-6 flex items-center justify-between gap-4">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center w-10 h-10 rounded-xl bg-surface-container-high text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="sell">sell</span>
</button>
<div class="h-4 w-[1px] bg-outline/20"></div>
<span class="text-xs font-bold font-manrope text-on-surface-variant tracking-wider uppercase">Essential Food</span>
</div>
<div class="flex bg-surface-container-high rounded-lg p-1 shrink-0">
<button class="p-1.5 rounded-md bg-surface-container-highest text-primary shadow-sm transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
</button>
<button class="p-1.5 rounded-md text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="list">list</span>
</button>
</div>
</section>
<!-- Flashcard Stack -->
<section class="relative flex-grow flex items-center justify-center py-4">
<!-- Background Stack Depth Layer 2 -->
<div class="absolute w-full h-[480px] bg-surface-container-low rounded-xl translate-x-3 translate-y-3 opacity-30 shadow-2xl"></div>
<!-- Background Stack Depth Layer 1 -->
<div class="absolute w-full h-[480px] bg-surface-container-high rounded-xl translate-x-1.5 translate-y-1.5 opacity-60 shadow-xl"></div>
<!-- Active Card -->
<div class="relative w-full h-[480px] bg-surface-container-highest rounded-xl shadow-2xl overflow-hidden flex flex-col group">
<!-- Card Image Area -->
<div class="relative h-2/5 w-full overflow-hidden">
<img alt="Traditional Dim Sum" class="w-full h-full object-cover grayscale-[0.2] group-hover:grayscale-0 transition-all duration-500" data-alt="close-up of steaming dim sum in bamboo baskets with dramatic low-key lighting and moody shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZXTqO2cpeEE_GsGTiKHuEBVldh74rQ-Sk4diSmREwuOzOa6py3Oy6GylhtZ_LMKtwKMm9QBdWcfnT7oJJea6AChcYGxMAMRUJg-vDu1wkHXzMaZG6TudK-BBTV4Y9TqVPAIpoFwOa71CizlvFvUgi-t3iuLGLGbFBqeh-PTUGuTptAnX0eD4D6yn3hkCNpzZLTNwrETnAJf9pqQo5wzopyN0VzHioYGfbBhghjQtHn29R-pKpSkncYeQQX9_Gkbu6Hb6iXg2wliyX"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-highest to-transparent"></div>
</div>
<!-- Card Content -->
<div class="flex-grow flex flex-col items-center justify-center px-8 pb-10 text-center">
<h2 class="font-headline font-bold text-6xl text-primary chinese-char mb-2">點心</h2>
<p class="font-body text-tertiary text-sm tracking-wide mb-8">diǎn xīn</p>
<div class="w-full h-px bg-outline-variant/10 mb-8"></div>
<p class="font-body text-on-surface text-2xl font-light mb-10">Snack / Dim Sum</p>
<!-- Pronunciation Button -->
<button class="flex flex-col items-center gap-3 active:scale-95 transition-transform group/btn">
<div class="w-16 h-16 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-lg shadow-primary/20 group-hover/btn:shadow-primary/40 transition-shadow">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</div>
<span class="text-[10px] uppercase tracking-[0.2em] font-bold text-outline group-hover/btn:text-primary transition-colors">Listen</span>
</button>
</div>
<!-- Swipe Indicators -->
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none opacity-20">
<span class="material-symbols-outlined text-4xl">chevron_left</span>
</div>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none opacity-20">
<span class="material-symbols-outlined text-4xl">chevron_right</span>
</div>
</div>
</section>
<!-- Progress Text -->
<div class="mt-8 text-center">
<p class="text-[10px] uppercase tracking-widest font-bold text-outline">Card 12 of 48 in 'Essential Food'</p>
</div>
</main>
<!-- Bottom Navigation Anchor -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-6 py-4 bg-[#13131b] border-t border-white/5">
<!-- Learn (Active) -->
<div class="flex flex-col items-center justify-center bg-[#5e5ce6] text-[#c2c1ff] rounded-2xl p-2 transition-all duration-300 scale-95 active:scale-90 cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">style</span>
<span class="font-manrope text-[10px] uppercase tracking-widest mt-1">Learn</span>
</div>
<!-- Library -->
<div class="flex flex-col items-center justify-center text-gray-500 p-2 hover:bg-[#1c1c26] hover:text-[#c2c1ff] transition-all duration-300 scale-95 active:scale-90 cursor-pointer">
<span class="material-symbols-outlined">list_alt</span>
<span class="font-manrope text-[10px] uppercase tracking-widest mt-1">Library</span>
</div>
<!-- Settings -->
<div class="flex flex-col items-center justify-center text-gray-500 p-2 hover:bg-[#1c1c26] hover:text-[#c2c1ff] transition-all duration-300 scale-95 active:scale-90 cursor-pointer">
<span class="material-symbols-outlined">settings</span>
<span class="font-manrope text-[10px] uppercase tracking-widest mt-1">Settings</span>
</div>
</nav>
</body></html>
