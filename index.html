<!DOCTYPE html>
<html class="dark" lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Lexicon</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <base href="./">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="public/assets/js/supabase-config.js"></script>
  <script src="public/assets/js/supabase-data.js"></script>
  <script src="public/assets/js/main.js"></script>
  <link rel="stylesheet" href="public/assets/css/main.css">
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30" x-data="lexiconApp()" x-init="init()">
  <div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
    <div class="absolute top-0 right-0 h-full w-1/3 bg-gradient-to-l from-primary/10 to-transparent"></div>
    <div class="absolute bottom-0 left-0 h-1/2 w-1/4 bg-gradient-to-tr from-primary-container/20 to-transparent blur-3xl"></div>
  </div>

  <header class="fixed top-0 left-0 z-50 flex h-16 w-full items-center justify-between border-b border-white/5 bg-[#13131b]/60 px-6 backdrop-blur-xl">
    <div class="flex items-center gap-4">
      <h1 class="font-headline text-lg font-black tracking-tighter text-primary">The Lexicon</h1>
    </div>

    <div class="flex items-center gap-4">
      <button x-show="!loading && !error && activeView !== 'settings'" type="button" data-testid="header-filter-toggle" class="flex items-center gap-2 rounded-full bg-surface-container-high px-3 py-2 text-xs font-bold uppercase tracking-[0.14em] text-on-surface transition-all hover:bg-surface-container-highest active:scale-95" @click="openFilterPanel(activeView)" :aria-label="t('filters')">
        <span class="material-symbols-outlined" :class="activeFilterCount ? 'fill-icon text-primary' : ''">tune</span>
        <span class="hidden sm:inline" x-text="activeFilterSummary"></span>
      </button>

      <div class="relative" @click.outside="quickLangOpen = false">
        <button type="button" data-testid="quick-lang-toggle" class="flex items-center gap-2 text-primary transition-opacity hover:opacity-80 active:opacity-60" @click="quickLangOpen = !quickLangOpen" :aria-label="t('changeInterfaceLanguage')">
          <span class="material-symbols-outlined">language</span>
        </button>

        <div x-cloak x-show="quickLangOpen" x-transition class="glass-panel absolute right-0 top-12 w-64 overflow-hidden rounded-xl shadow-2xl">
          <div class="space-y-1 p-2">
            <template x-for="language in languages" :key="language.code">
              <button type="button" class="flex w-full items-center justify-between rounded-lg px-3 py-3 text-left transition-colors" :class="nativeLanguage === language.code ? 'bg-primary-container text-on-primary-container' : 'hover:bg-surface-bright text-on-surface'" @click="nativeLanguage = language.code; quickLangOpen = false; applyDocumentLanguage(); persistPreferences()">
                <div>
                  <p class="text-sm font-medium" :data-testid="`quick-lang-option-label-${language.code}`" x-text="language.nativeLabel || language.label"></p>
                </div>
                <span x-show="nativeLanguage === language.code" class="material-symbols-outlined text-sm fill-icon">check_circle</span>
              </button>
            </template>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="mx-auto min-h-screen max-w-4xl px-6 pb-32 pt-20">
    <section x-cloak x-show="loading" class="flex min-h-[70vh] items-center justify-center">
      <div class="glass-panel w-full max-w-md rounded-3xl p-8 text-center shadow-ambient">
        <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-primary-container/20 text-primary">
          <span class="material-symbols-outlined text-3xl fill-icon">auto_stories</span>
        </div>
        <h2 class="mb-3 font-headline text-3xl font-extrabold tracking-tight text-primary" x-text="t('loadingTitle')"></h2>
        <p class="text-sm leading-relaxed text-on-surface-variant" x-text="t('loadingDescription')"></p>
      </div>
    </section>

    <section x-cloak x-show="!loading && error" class="flex min-h-[70vh] items-center justify-center">
      <div class="w-full max-w-lg rounded-3xl border border-error/20 bg-surface-container-low p-8 text-center shadow-xl">
        <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-error-container/20 text-error">
          <span class="material-symbols-outlined text-3xl fill-icon">error</span>
        </div>
        <h2 class="mb-3 font-headline text-3xl font-extrabold tracking-tight text-on-surface" x-text="t('loadErrorTitle')"></h2>
        <p class="mb-6 text-sm leading-relaxed text-on-surface-variant" x-text="error"></p>
        <button type="button" class="rounded-full bg-gradient-to-br from-primary to-primary-container px-8 py-3 font-headline font-bold text-on-primary transition-all hover:opacity-90 active:scale-95" @click="init()" x-text="t('retry')"></button>
      </div>
    </section>

    <div x-cloak x-show="!loading && !error">
      <section x-show="activeView === 'card'" class="min-h-[70vh]">
        <template x-if="visibleCardWords.length">
          <div>
            <section class="relative flex min-h-[500px] items-start justify-center py-1">
              <div class="absolute h-[480px] w-full rounded-xl bg-surface-container-low opacity-30 shadow-2xl translate-x-3 translate-y-3"></div>
              <div class="absolute h-[480px] w-full rounded-xl bg-surface-container-high opacity-60 shadow-xl translate-x-1.5 translate-y-1.5"></div>

              <article class="relative flex h-[480px] w-full flex-col overflow-hidden rounded-xl shadow-2xl card-swipe-area" :class="cardMotionClass" :style="cardStyle" @pointerdown="handlePointerDown($event)" @pointermove="handlePointerMove($event)" @pointerup="handlePointerUp($event)" @pointercancel="handlePointerCancel($event)">
                <div class="pointer-events-none absolute inset-0 bg-surface-container-highest/30"></div>
                <div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-surface via-surface/50 to-transparent"></div>

                <div class="relative z-10 flex flex-1 flex-col justify-between px-6 pb-7 pt-8 text-center">
                  <div class="mx-auto flex w-full max-w-xl flex-col items-center">
                    <h2 class="mb-2 max-h-40 max-w-full overflow-y-auto break-words rounded-[2rem] bg-black/25 px-5 py-4 font-headline text-5xl font-black leading-tight tracking-[0.05em] text-on-surface shadow-2xl md:max-h-56 md:text-7xl" x-text="cardHeadlineText()"></h2>
                    <p x-show="cardPronunciationText()" data-testid="card-pronunciation" class="mb-4 rounded-full bg-black/30 px-4 py-1.5 text-base font-semibold tracking-wide text-tertiary" x-text="cardPronunciationText()"></p>
                    <div class="flex items-center justify-center gap-4">
                      <button type="button" data-testid="card-audio-button" class="group/btn flex h-16 w-16 items-center justify-center rounded-full bg-gradient-to-br from-primary to-primary-container shadow-lg shadow-primary/20 transition-shadow active:scale-95 disabled:cursor-not-allowed disabled:opacity-40" @click="playAudio(currentCardWord)" :disabled="!hasAudio(currentCardWord)" :aria-label="t('playAudio')">
                        <span class="material-symbols-outlined fill-icon text-3xl text-on-primary">volume_up</span>
                      </button>
                      <button type="button" data-testid="card-translation-toggle" class="flex h-16 w-16 items-center justify-center rounded-full bg-gradient-to-br from-tertiary to-tertiary-container text-on-tertiary-container shadow-lg shadow-tertiary/20 transition-shadow active:scale-95" @click="showCardTranslation = !showCardTranslation" :aria-label="translationToggleLabel()">
                        <span class="material-symbols-outlined text-3xl">translate</span>
                      </button>
                    </div>
                  </div>

                  <div class="flex justify-center gap-3">
                    <button type="button" data-testid="card-status-normal" :class="statusButtonClasses(currentCardWord.id, 'normal')" @click.stop="toggleWordStatus(currentCardWord.id, 'normal')" :aria-label="t('clearMark')">
                      <span class="material-symbols-outlined" :class="isStatusActive(currentCardWord.id, 'normal') ? 'fill-icon' : ''">auto_stories</span>
                    </button>
                    <button type="button" data-testid="card-status-favorite" :class="statusButtonClasses(currentCardWord.id, 'favorite')" @click.stop="toggleWordStatus(currentCardWord.id, 'favorite')" :aria-label="t('markFavorite')">
                      <span class="material-symbols-outlined" :class="isStatusActive(currentCardWord.id, 'favorite') ? 'fill-icon' : ''">favorite</span>
                    </button>
                    <button type="button" data-testid="card-status-ignored" :class="statusButtonClasses(currentCardWord.id, 'ignored')" @click.stop="toggleWordStatus(currentCardWord.id, 'ignored')" :aria-label="t('markIgnored')">
                      <span class="material-symbols-outlined">do_not_disturb_on</span>
                    </button>
                  </div>
                </div>

                <button type="button" class="absolute left-2 top-1/2 z-20 flex h-12 w-12 -translate-y-1/2 items-center justify-center rounded-full bg-surface-container-highest text-primary shadow-lg shadow-black/20 transition-colors hover:bg-surface-container-high" @click.prevent.stop="prevCard()" :aria-label="t('previousCard')">
                  <span class="material-symbols-outlined text-4xl">chevron_left</span>
                </button>
                <button type="button" class="absolute right-2 top-1/2 z-20 flex h-12 w-12 -translate-y-1/2 items-center justify-center rounded-full bg-surface-container-highest text-primary shadow-lg shadow-black/20 transition-colors hover:bg-surface-container-high" @click.prevent.stop="nextCard()" :aria-label="t('nextCard')">
                  <span class="material-symbols-outlined text-4xl">chevron_right</span>
                </button>
              </article>
            </section>

          </div>
        </template>

        <template x-if="!visibleCardWords.length">
          <section class="flex min-h-[60vh] items-center justify-center">
            <div class="w-full max-w-2xl rounded-3xl bg-surface-container-low p-8 shadow-xl">
              <div class="mb-8 flex items-start gap-4">
                <div class="rounded-2xl bg-primary-container/15 p-3 text-primary">
                  <span class="material-symbols-outlined fill-icon text-3xl">search_off</span>
                </div>
                <div>
                  <p class="mb-2 text-xs font-bold uppercase tracking-[0.18em] text-tertiary" x-text="t('emptyEyebrow')"></p>
                  <h2 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface" x-text="t('emptyTitle')"></h2>
                </div>
              </div>

              <p class="mb-8 max-w-xl text-sm leading-relaxed text-on-surface-variant" x-text="t('emptyDescription')"></p>

              <div class="grid gap-4 md:grid-cols-[1fr_auto] md:items-center">
                <div class="rounded-2xl border border-outline-variant/10 bg-surface-container-lowest p-5">
                  <p class="mb-1 text-sm font-semibold text-on-surface" x-text="t('emptyTipTitle')"></p>
                  <p class="text-xs leading-relaxed text-on-surface-variant" x-text="t('emptyTipBody')"></p>
                </div>

                <div class="flex flex-col gap-3 md:w-56">
                  <button type="button" class="rounded-full bg-gradient-to-br from-primary to-primary-container px-6 py-3 font-headline font-bold text-on-primary transition-all hover:opacity-90 active:scale-95" @click="openFilterPanel('card')" x-text="t('openFilters')"></button>
                  <button type="button" class="rounded-full bg-surface-container-high px-6 py-3 font-semibold text-primary transition-all hover:bg-surface-bright active:scale-95" @click="clearAppliedFilters()" x-text="t('clearFilters')"></button>
                </div>
              </div>
            </div>
          </section>
        </template>
      </section>

      <section x-show="activeView === 'list'" data-testid="view-list" class="min-h-[70vh]">
        <div class="mb-4 flex items-center gap-3">
          <div class="relative flex-1">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-sm text-outline">search</span>
            <input type="text" data-testid="list-search" class="w-full rounded-xl border-none bg-surface-container-highest py-3 pl-11 pr-12 text-on-surface transition-all placeholder:text-outline/50 focus:ring-1 focus:ring-primary/20" :placeholder="t('searchPlaceholder')" x-model.trim="searchQuery">
            <button type="button" x-show="searchQuery" class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full p-1 text-outline transition-colors hover:text-primary" @click="searchQuery = ''" :aria-label="t('clearSearch')">
              <span class="material-symbols-outlined text-base">close</span>
            </button>
          </div>
        </div>

        <template x-if="filteredListWords.length">
          <div class="space-y-4">
            <template x-for="word in filteredListWords" :key="word.id">
              <article class="group rounded-xl border border-transparent bg-surface-container-low p-4 transition-all hover:border-outline-variant/30 hover:bg-surface-container-high">
                <div class="flex items-center gap-4">
                  <button type="button" data-testid="list-item-open" class="relative h-16 w-16 flex-shrink-0 overflow-hidden rounded-lg bg-surface-container-highest" @click="openWordDetails(word.id)">
                    <img x-show="word.img" class="h-full w-full object-cover grayscale transition-all duration-500 group-hover:grayscale-0" :src="word.img" :alt="getWordText(word, displayLanguage1)" @error="handleImageError($event)">
                  </button>

                  <button type="button" class="min-w-0 flex-1 text-left" @click="openWordDetails(word.id)">
                    <div class="flex items-center justify-between gap-4">
                      <div class="min-w-0">
                        <span class="block truncate font-headline text-xl tracking-wide text-primary" x-text="getWordText(word, displayLanguage1)"></span>
                        <p class="mt-0.5 truncate text-sm text-outline" x-text="getWordText(word, displayLanguage2)"></p>
                        <p class="mt-2 text-[10px] font-bold uppercase tracking-[0.18em] text-tertiary" x-text="listItemTagSummary(word)"></p>
                      </div>
                    </div>
                  </button>

                  <button type="button" class="rounded-full p-2 text-tertiary transition-transform hover:scale-110 active:scale-95 disabled:cursor-not-allowed disabled:opacity-40" @click.stop="playAudio(word)" :disabled="!hasAudio(word)" :aria-label="t('playAudio')">
                    <span class="material-symbols-outlined">volume_up</span>
                  </button>
                </div>

                <div class="mt-4 flex items-center justify-end gap-2">
                  <button type="button" class="flex h-10 w-10 items-center justify-center rounded-full border transition-all active:scale-95" :class="statusButtonClasses(word.id, 'normal')" @click.stop="toggleWordStatus(word.id, 'normal')" :aria-label="t('clearMark')">
                    <span class="material-symbols-outlined" :class="isStatusActive(word.id, 'normal') ? 'fill-icon' : ''">auto_stories</span>
                  </button>
                  <button type="button" class="flex h-10 w-10 items-center justify-center rounded-full border transition-all active:scale-95" :class="statusButtonClasses(word.id, 'favorite')" @click.stop="toggleWordStatus(word.id, 'favorite')" :aria-label="t('markFavorite')">
                    <span class="material-symbols-outlined" :class="isStatusActive(word.id, 'favorite') ? 'fill-icon' : ''">favorite</span>
                  </button>
                  <button type="button" class="flex h-10 w-10 items-center justify-center rounded-full border transition-all active:scale-95" :class="statusButtonClasses(word.id, 'ignored')" @click.stop="toggleWordStatus(word.id, 'ignored')" :aria-label="t('markIgnored')">
                    <span class="material-symbols-outlined">do_not_disturb_on</span>
                  </button>
                </div>
              </article>
            </template>
          </div>
        </template>

        <template x-if="!filteredListWords.length">
          <section class="flex min-h-[60vh] items-center justify-center">
            <div class="w-full max-w-2xl rounded-3xl bg-surface-container-low p-8 shadow-xl">
              <div class="mb-8 flex items-start gap-4">
                <div class="rounded-2xl bg-primary-container/15 p-3 text-primary">
                  <span class="material-symbols-outlined fill-icon text-3xl">pageview</span>
                </div>
                <div>
                  <p class="mb-2 text-xs font-bold uppercase tracking-[0.18em] text-tertiary" x-text="t('emptySearchEyebrow')"></p>
                  <h2 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface" x-text="t('emptySearchTitle')"></h2>
                </div>
              </div>

              <p class="mb-8 max-w-xl text-sm leading-relaxed text-on-surface-variant" x-text="t('emptySearchDescription')"></p>

              <div class="grid gap-4 md:grid-cols-[1fr_auto] md:items-center">
                <div class="rounded-2xl border border-outline-variant/10 bg-surface-container-lowest p-5">
                  <p class="mb-1 text-sm font-semibold text-on-surface" x-text="t('emptyTipTitle')"></p>
                  <p class="text-xs leading-relaxed text-on-surface-variant" x-text="t('emptySearchTipBody')"></p>
                </div>

                <div class="flex flex-col gap-3 md:w-56">
                  <button type="button" class="rounded-full bg-gradient-to-br from-primary to-primary-container px-6 py-3 font-headline font-bold text-on-primary transition-all hover:opacity-90 active:scale-95" @click="searchQuery = ''" x-text="t('clearSearch')"></button>
                  <button type="button" class="rounded-full bg-surface-container-high px-6 py-3 font-semibold text-primary transition-all hover:bg-surface-bright active:scale-95" @click="openFilterPanel('list')" x-text="t('adjustFilters')"></button>
                </div>
              </div>
            </div>
          </section>
        </template>
      </section>

      <section x-show="activeView === 'favorites'" data-testid="view-favorites" class="min-h-[70vh]">
        <section class="mb-4 space-y-2 pt-2">
          <p class="text-xs font-bold uppercase tracking-[0.18em] text-tertiary" x-text="t('favoritesEyebrow')"></p>
          <h2 class="font-headline text-3xl font-extrabold tracking-tight text-primary" x-text="t('favoritesTitle')"></h2>
          <p class="text-sm text-on-surface-variant" x-text="t('favoritesDescription')"></p>
        </section>

        <div class="mb-4 flex items-center gap-3">
          <div class="relative flex-1">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-sm text-outline">search</span>
            <input type="text" data-testid="favorites-search" class="w-full rounded-xl border-none bg-surface-container-highest py-3 pl-11 pr-12 text-on-surface transition-all placeholder:text-outline/50 focus:ring-1 focus:ring-primary/20" :placeholder="t('searchFavoritesPlaceholder')" x-model.trim="favoritesQuery">
            <button type="button" x-show="favoritesQuery" class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full p-1 text-outline transition-colors hover:text-primary" @click="favoritesQuery = ''" :aria-label="t('clearSearch')">
              <span class="material-symbols-outlined text-base">close</span>
            </button>
          </div>
        </div>

        <div class="mb-6 flex justify-end">
          <div class="rounded-full bg-primary-container px-4 py-2 text-xs font-bold uppercase tracking-[0.18em] text-on-primary-container">
            <span x-text="t('favorites')"></span>
          </div>
        </div>

        <template x-if="filteredFavoriteWords.length">
          <div class="space-y-4">
            <template x-for="word in filteredFavoriteWords" :key="word.id">
              <article data-testid="favorites-item" class="group rounded-xl border border-transparent bg-surface-container-low p-4 transition-all hover:border-outline-variant/30 hover:bg-surface-container-high">
                <div class="flex items-center gap-4">
                  <button type="button" class="relative h-16 w-16 flex-shrink-0 overflow-hidden rounded-lg bg-surface-container-highest" @click="openWordDetails(word.id)" :aria-label="t('openDetails')">
                    <img x-show="word.img" class="h-full w-full object-cover grayscale transition-all duration-500 group-hover:grayscale-0" :src="word.img" :alt="getWordText(word, displayLanguage1)" @error="handleImageError($event)">
                  </button>

                  <button type="button" class="min-w-0 flex-1 text-left" @click="openWordDetails(word.id)" :aria-label="t('openDetails')">
                    <div class="flex items-center justify-between gap-4">
                      <div class="min-w-0">
                        <span class="block truncate font-headline text-xl tracking-wide text-primary" x-text="getWordText(word, displayLanguage1)"></span>
                        <p class="mt-0.5 truncate text-sm text-outline" x-text="getWordText(word, displayLanguage2)"></p>
                        <p class="mt-2 text-[10px] font-bold uppercase tracking-[0.18em] text-tertiary" x-text="listItemTagSummary(word)"></p>
                      </div>
                    </div>
                  </button>

                  <button type="button" class="rounded-full p-2 text-tertiary transition-transform hover:scale-110 active:scale-95 disabled:cursor-not-allowed disabled:opacity-40" @click.stop="playAudio(word)" :disabled="!hasAudio(word)" :aria-label="t('playAudio')">
                    <span class="material-symbols-outlined">volume_up</span>
                  </button>
                </div>

                <div class="mt-4 flex items-center justify-end">
                  <button type="button" data-testid="favorites-status-favorite" class="flex h-10 w-10 items-center justify-center rounded-full border transition-all active:scale-95" :class="statusButtonClasses(word.id, 'favorite')" @click.stop="removeFavoriteFromFavoritesPage(word.id)" :aria-label="t('unmarkFavorite')">
                    <span class="material-symbols-outlined" :class="isStatusActive(word.id, 'favorite') ? 'fill-icon' : ''">favorite</span>
                  </button>
                </div>
              </article>
            </template>
          </div>
        </template>

        <template x-if="!filteredFavoriteWords.length">
          <section class="flex min-h-[60vh] items-center justify-center">
            <div class="w-full max-w-2xl rounded-3xl bg-surface-container-low p-8 shadow-xl">
              <div class="mb-8 flex items-start gap-4">
                <div class="rounded-2xl bg-primary-container/15 p-3 text-primary">
                  <span class="material-symbols-outlined fill-icon text-3xl">favorite</span>
                </div>
                <div>
                  <p class="mb-2 text-xs font-bold uppercase tracking-[0.18em] text-tertiary" x-text="t('favoritesEyebrow')"></p>
                  <h2 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface" x-text="t('favoritesEmptyTitle')"></h2>
                </div>
              </div>

              <p class="mb-8 max-w-xl text-sm leading-relaxed text-on-surface-variant" x-text="t('favoritesEmptyDescription')"></p>

              <div class="grid gap-4 md:grid-cols-[1fr_auto] md:items-center">
                <div class="rounded-2xl border border-outline-variant/10 bg-surface-container-lowest p-5">
                  <p class="mb-1 text-sm font-semibold text-on-surface" x-text="t('emptyTipTitle')"></p>
                  <p class="text-xs leading-relaxed text-on-surface-variant" x-text="t('favoritesEmptyTipBody')"></p>
                </div>

                <div class="flex flex-col gap-3 md:w-56">
                  <button type="button" class="rounded-full bg-gradient-to-br from-primary to-primary-container px-6 py-3 font-headline font-bold text-on-primary transition-all hover:opacity-90 active:scale-95" @click="switchView('list')" x-text="t('goToLibrary')"></button>
                  <button type="button" class="rounded-full bg-surface-container-high px-6 py-3 font-semibold text-primary transition-all hover:bg-surface-bright active:scale-95" @click="clearAppliedFilters()" x-text="t('clearFilters')"></button>
                </div>
              </div>
            </div>
          </section>
        </template>
      </section>

      <section x-show="activeView === 'settings'" class="space-y-8">
        <section class="space-y-2 pt-4">
          <h2 class="font-headline text-3xl font-extrabold tracking-tight text-primary" x-text="t('settingsTitle')"></h2>
          <p class="text-sm text-on-surface-variant" x-text="t('settingsDescription')"></p>
        </section>

        <div class="space-y-6">
          <div class="space-y-6 rounded-xl bg-surface-container-low p-6">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="rounded-lg bg-primary-container/20 p-2 text-primary">
                  <span class="material-symbols-outlined">person_pin</span>
                </div>
                <h3 class="font-headline text-lg font-bold" x-text="t('nativeLanguage')"></h3>
              </div>
              <span class="rounded-full bg-tertiary/10 px-2 py-1 text-[10px] font-bold uppercase tracking-[0.16em] text-tertiary" x-text="t('required')"></span>
            </div>

            <div class="relative" @click.outside="openSettingSelect = null">
              <button type="button" data-testid="settings-native-trigger" class="flex w-full items-center justify-between rounded-xl border border-transparent bg-surface-container-highest p-4 transition-all hover:border-primary/20" @click.stop="toggleSettingSelect('nativeLanguage')">
                <div class="flex items-center gap-4">
                  <span class="text-base font-bold text-primary" x-text="getLanguageMeta(nativeLanguage).symbol"></span>
                  <div class="text-left">
                    <p class="font-semibold text-on-surface" x-text="getLanguageMeta(nativeLanguage).label"></p>
                    <p class="text-xs text-on-surface-variant" x-text="getLanguageMeta(nativeLanguage).description"></p>
                  </div>
                </div>
                <span class="material-symbols-outlined text-outline" x-text="openSettingSelect === 'nativeLanguage' ? 'expand_less' : 'expand_more'"></span>
              </button>

              <div x-cloak x-show="openSettingSelect === 'nativeLanguage'" x-transition class="glass-panel mt-2 overflow-hidden rounded-xl shadow-2xl">
                <div class="space-y-1 p-2">
                  <template x-for="language in languages" :key="`native-${language.code}`">
                    <button type="button" :data-testid="`settings-native-option-${language.code}`" class="flex w-full items-center justify-between rounded-lg p-3 transition-colors" :class="nativeLanguage === language.code ? 'bg-primary-container text-on-primary-container' : 'hover:bg-surface-bright text-on-surface'" @click.stop="selectLanguage('nativeLanguage', language.code)">
                      <div class="flex items-center gap-4">
                        <span class="text-sm font-bold" x-text="language.symbol"></span>
                        <span class="text-sm font-medium" x-text="language.label"></span>
                      </div>
                      <span x-show="nativeLanguage === language.code" class="material-symbols-outlined fill-icon text-sm">check_circle</span>
                    </button>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <div class="space-y-6 rounded-xl bg-surface-container-low p-6">
            <div class="flex items-center gap-3">
              <div class="rounded-lg bg-primary-container/20 p-2 text-primary">
                <span class="material-symbols-outlined">looks_one</span>
              </div>
              <h3 class="font-headline text-lg font-bold" x-text="t('displayLanguage1')"></h3>
            </div>

            <div class="relative" @click.outside="openSettingSelect = null">
              <button type="button" data-testid="settings-display1-trigger" class="flex w-full items-center justify-between rounded-xl border border-transparent bg-surface-container-highest p-4 transition-all hover:border-primary/20" @click.stop="toggleSettingSelect('displayLanguage1')">
                <div class="flex items-center gap-4">
                  <span class="text-base font-bold text-primary" x-text="getLanguageMeta(displayLanguage1).symbol"></span>
                  <div class="text-left">
                    <p class="font-semibold text-on-surface" x-text="getLanguageMeta(displayLanguage1).label"></p>
                    <p class="text-xs text-on-surface-variant" x-text="t('displayLanguage1Description')"></p>
                  </div>
                </div>
                <span class="material-symbols-outlined text-outline" x-text="openSettingSelect === 'displayLanguage1' ? 'expand_less' : 'expand_more'"></span>
              </button>

              <div x-cloak x-show="openSettingSelect === 'displayLanguage1'" x-transition class="glass-panel mt-2 overflow-hidden rounded-xl shadow-2xl">
                <div class="space-y-1 p-2">
                  <template x-for="language in languages" :key="`displayLanguage1-${language.code}`">
                    <button type="button" :data-testid="`settings-display1-option-${language.code}`" class="flex w-full items-center justify-between rounded-lg p-3 transition-colors" :class="displayLanguage1 === language.code ? 'bg-primary-container text-on-primary-container' : 'hover:bg-surface-bright text-on-surface'" @click.stop="selectLanguage('displayLanguage1', language.code)">
                      <div class="flex items-center gap-4">
                        <span class="text-sm font-bold" x-text="language.symbol"></span>
                        <span class="text-sm font-medium" x-text="language.label"></span>
                      </div>
                      <span x-show="displayLanguage1 === language.code" class="material-symbols-outlined fill-icon text-sm">check_circle</span>
                    </button>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <div class="space-y-6 rounded-xl bg-surface-container-low p-6">
            <div class="flex items-center gap-3">
              <div class="rounded-lg bg-primary-container/20 p-2 text-primary">
                <span class="material-symbols-outlined">looks_two</span>
              </div>
              <h3 class="font-headline text-lg font-bold" x-text="t('displayLanguage2')"></h3>
            </div>

            <div class="relative" @click.outside="openSettingSelect = null">
              <button type="button" data-testid="settings-display2-trigger" class="flex w-full items-center justify-between rounded-xl border border-primary/40 bg-surface-container-highest p-4 ring-1 ring-primary/20 transition-all" @click.stop="toggleSettingSelect('displayLanguage2')">
                <div class="flex items-center gap-4">
                  <span class="text-base font-bold text-primary" x-text="getLanguageMeta(displayLanguage2).symbol"></span>
                  <div class="text-left">
                    <p class="font-semibold text-on-surface" x-text="getLanguageMeta(displayLanguage2).label"></p>
                    <p class="text-xs text-on-surface-variant" x-text="t('displayLanguage2Description')"></p>
                  </div>
                </div>
                <span class="material-symbols-outlined text-primary" x-text="openSettingSelect === 'displayLanguage2' ? 'expand_less' : 'expand_more'"></span>
              </button>

              <div x-cloak x-show="openSettingSelect === 'displayLanguage2'" x-transition class="glass-panel mt-2 overflow-hidden rounded-xl border border-outline-variant/15 shadow-2xl">
                <div class="space-y-1 p-2">
                  <template x-for="language in languages" :key="`displayLanguage2-${language.code}`">
                    <button type="button" :data-testid="`settings-display2-option-${language.code}`" class="flex w-full items-center justify-between rounded-lg p-3 transition-colors" :class="displayLanguage2 === language.code ? 'bg-primary-container text-on-primary-container' : 'hover:bg-surface-bright text-on-surface'" @click.stop="selectLanguage('displayLanguage2', language.code)">
                      <div class="flex items-center gap-4">
                        <span class="text-sm font-bold" x-text="language.symbol"></span>
                        <span class="text-sm font-medium" x-text="language.label"></span>
                      </div>
                      <span x-show="displayLanguage2 === language.code" class="material-symbols-outlined fill-icon text-sm">check_circle</span>
                    </button>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <div class="flex gap-4 rounded-xl border border-tertiary/10 bg-tertiary/5 p-4">
            <span class="material-symbols-outlined text-tertiary">info</span>
            <p class="text-xs leading-relaxed text-on-surface-variant" x-text="t('settingsInfo')"></p>
          </div>

          <p x-show="settingsError" class="rounded-xl border border-error/20 bg-error-container/10 px-4 py-3 text-sm text-error" x-text="settingsError"></p>
          <button type="button" data-testid="settings-save" class="w-full rounded-full bg-gradient-to-br from-primary to-primary-container py-4 font-headline font-bold text-on-primary shadow-lg shadow-primary-container/20 transition-transform active:scale-95" @click="savePreferences()" x-text="settingsSaved ? t('savedPreferences') : t('savePreferences')"></button>
        </div>
      </section>

    </div>
  </main>

  <div x-cloak x-show="filterPanelOpen" class="fixed inset-0 z-[60] flex items-end justify-center bg-surface/80 p-0 backdrop-blur-sm md:items-center md:p-6" @click.self="closeFilterPanel()" x-transition.opacity>
    <section class="w-full max-w-2xl rounded-t-[2rem] border border-white/10 bg-[#1b1b25]/95 p-6 shadow-2xl backdrop-blur-xl md:rounded-[2rem]">
      <div class="mb-6 flex items-start justify-between gap-4">
        <div>
          <p class="mb-2 text-xs font-bold uppercase tracking-[0.18em] text-tertiary" x-text="t('filters')"></p>
          <h2 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface" x-text="t('filterTitle')"></h2>
          <p class="mt-2 text-sm leading-relaxed text-on-surface-variant" x-text="t('filterHint')"></p>
        </div>
        <button type="button" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-surface-container-high text-on-surface transition-colors hover:bg-surface-container-highest" @click="closeFilterPanel()" :aria-label="t('closeModal')">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="max-h-[60dvh] space-y-6 overflow-y-auto pr-1">
        <section>
          <h3 class="mb-3 font-headline text-sm font-bold uppercase tracking-[0.18em] text-primary" x-text="t('statusFilterTitle')"></h3>
          <div class="flex flex-wrap gap-2">
            <template x-for="option in statusFilterOptions" :key="`draft-${option.value}`">
              <button type="button" class="flex items-center gap-2 rounded-full px-4 py-2 text-xs font-bold uppercase tracking-[0.18em] transition-all active:scale-95" :class="activeDraftStatusFilters.includes(option.value) ? 'bg-primary-container text-on-primary-container shadow-lg shadow-primary/10' : 'bg-surface-container-high text-outline hover:text-on-surface'" @click="toggleDraftStatusFilter(option.value)">
                <span class="material-symbols-outlined text-[18px]" :class="activeDraftStatusFilters.includes(option.value) && option.value !== 'ignored' ? 'fill-icon' : ''" x-text="option.icon"></span>
                <span x-text="option.label"></span>
              </button>
            </template>
          </div>
        </section>

        <section>
          <h3 class="mb-3 font-headline text-sm font-bold uppercase tracking-[0.18em] text-primary" x-text="t('tagFilterTitle')"></h3>
          <div class="flex flex-wrap gap-3 rounded-2xl bg-surface-container-low p-4">
            <template x-for="tag in tags" :key="tag.id">
              <button type="button" class="group flex items-center gap-2 rounded-full px-5 py-3 transition-all duration-300" :class="draftTagIds.includes(tag.id) ? 'bg-primary-container text-on-primary-container scale-95' : 'bg-surface-container-lowest text-on-surface-variant hover:bg-white/5'" @click="toggleDraftTag(tag.id)">
                <span class="material-symbols-outlined text-sm" :class="draftTagIds.includes(tag.id) ? 'fill-icon' : ''" x-text="tag.icon"></span>
                <span class="font-label text-sm font-medium tracking-wide" x-text="getTagName(tag)"></span>
              </button>
            </template>
          </div>
        </section>
      </div>

      <div class="mt-6 grid grid-cols-2 gap-3">
        <button type="button" class="rounded-full bg-surface-container-high px-4 py-3 text-sm font-semibold uppercase text-on-surface transition-all hover:bg-surface-container-highest active:scale-95" @click="resetDraftFilters()" :aria-label="t('clearFilters')" x-text="t('clearFilters')"></button>
        <button type="button" class="rounded-full bg-gradient-to-br from-primary to-primary-container px-4 py-3 font-headline text-sm font-bold uppercase text-on-primary transition-all hover:opacity-90 active:scale-95" @click="applyDraftFilters()" :aria-label="t('applyFilters')" x-text="t('applyFilters')"></button>
      </div>
    </section>
  </div>

  <div x-cloak x-show="detailModalOpen && activeWord" class="fixed inset-0 z-[60] flex items-center justify-center bg-surface/90 p-6 backdrop-blur-sm" @click.self="closeWordDetails()" x-transition.opacity>
    <div data-testid="modal-card" class="relative flex h-[480px] w-full max-w-md flex-col overflow-hidden rounded-xl bg-surface-container-low shadow-2xl" :style="activeWordCardStyle()">
      <button type="button" data-testid="modal-close" class="absolute right-6 top-6 z-50 flex h-10 w-10 items-center justify-center rounded-full bg-surface/40 text-on-surface transition-colors hover:bg-surface/60" @click="closeWordDetails()" :aria-label="t('closeModal')">
        <span class="material-symbols-outlined">close</span>
      </button>

      <div class="pointer-events-none absolute inset-0 bg-surface-container-highest/30"></div>
      <div class="absolute inset-0 z-0 bg-gradient-to-t from-surface via-surface/50 to-transparent"></div>

      <div class="relative z-10 flex flex-1 flex-col justify-between px-6 pb-7 pt-8 text-center">
        <div class="mx-auto flex w-full max-w-xl flex-col items-center">
          <h2 class="mb-2 max-h-40 max-w-full overflow-y-auto break-words rounded-[2rem] bg-black/25 px-5 py-4 font-headline text-5xl font-black leading-tight tracking-[0.05em] text-on-surface shadow-2xl md:max-h-56 md:text-7xl" x-text="getWordText(activeWord, cardHeadlineLanguage())"></h2>
          <p x-show="activeWordPronunciationText()" data-testid="modal-pronunciation" class="mb-4 rounded-full bg-black/30 px-4 py-1.5 text-base font-semibold tracking-wide text-tertiary" x-text="activeWordPronunciationText()"></p>
          <div class="flex items-center justify-center gap-4">
            <button type="button" data-testid="modal-audio-button" class="group/btn flex h-16 w-16 items-center justify-center rounded-full bg-gradient-to-br from-primary to-primary-container shadow-lg shadow-primary/20 transition-shadow active:scale-95 disabled:cursor-not-allowed disabled:opacity-40" @click="playAudio(activeWord)" :disabled="!hasAudio(activeWord)" :aria-label="t('playAudio')">
              <span class="material-symbols-outlined fill-icon text-3xl text-on-primary">volume_up</span>
            </button>
            <button type="button" data-testid="modal-translation-toggle" class="flex h-16 w-16 items-center justify-center rounded-full bg-gradient-to-br from-tertiary to-tertiary-container text-on-tertiary-container shadow-lg shadow-tertiary/20 transition-shadow active:scale-95" @click="showCardTranslation = !showCardTranslation" :aria-label="translationToggleLabel()">
              <span class="material-symbols-outlined text-3xl">translate</span>
            </button>
          </div>
        </div>

        <div class="flex justify-center gap-3">
          <button type="button" data-testid="modal-status-normal" :class="activeWord ? statusButtonClasses(activeWord.id, 'normal') : ''" @click="if (activeWord) toggleWordStatus(activeWord.id, 'normal')" :aria-label="t('clearMark')">
            <span class="material-symbols-outlined" :class="activeWord && isStatusActive(activeWord.id, 'normal') ? 'fill-icon' : ''">auto_stories</span>
          </button>
          <button type="button" data-testid="modal-status-favorite" :class="activeWord ? statusButtonClasses(activeWord.id, 'favorite') : ''" @click="if (activeWord) toggleWordStatus(activeWord.id, 'favorite')" :aria-label="t('markFavorite')">
            <span class="material-symbols-outlined" :class="activeWord && isStatusActive(activeWord.id, 'favorite') ? 'fill-icon' : ''">favorite</span>
          </button>
          <button type="button" data-testid="modal-status-ignored" :class="activeWord ? statusButtonClasses(activeWord.id, 'ignored') : ''" @click="if (activeWord) toggleWordStatus(activeWord.id, 'ignored')" :aria-label="t('markIgnored')">
            <span class="material-symbols-outlined">do_not_disturb_on</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div x-cloak x-show="favoritesSnackbar" x-transition class="pointer-events-none fixed inset-x-0 bottom-24 z-[70] flex justify-center px-6">
    <div class="pointer-events-auto flex w-full max-w-md items-center justify-between gap-4 rounded-2xl border border-white/10 bg-[#1b1b25]/95 px-4 py-3 shadow-2xl backdrop-blur-xl">
      <p class="min-w-0 flex-1 truncate text-sm text-on-surface" x-text="favoritesSnackbar ? favoritesSnackbar.message : ''"></p>
      <button x-show="favoritesSnackbar && favoritesSnackbar.type === 'removed'" type="button" class="shrink-0 text-sm font-bold text-primary transition-opacity hover:opacity-80" @click="undoRemovedFavorite()" x-text="favoritesSnackbar ? favoritesSnackbar.actionLabel : ''"></button>
    </div>
  </div>

  <nav class="fixed bottom-0 left-0 z-50 flex w-full items-center justify-around border-t border-white/5 bg-[#13131b] px-6 py-4">
    <button type="button" data-testid="nav-card" class="flex scale-95 flex-col items-center justify-center rounded-2xl p-2 transition-all duration-300 active:scale-90" :class="activeView === 'card' ? 'bg-primary-container text-primary' : 'text-gray-500 hover:bg-[#1c1c26] hover:text-primary'" @click="switchView('card')">
      <span class="material-symbols-outlined" :class="activeView === 'card' ? 'fill-icon' : ''">style</span>
      <span class="mt-1 font-headline text-[10px] uppercase tracking-widest" x-text="t('learn')"></span>
    </button>

    <button type="button" data-testid="nav-list" class="flex scale-95 flex-col items-center justify-center rounded-2xl p-2 transition-all duration-300 active:scale-90" :class="activeView === 'list' ? 'bg-primary-container text-primary' : 'text-gray-500 hover:bg-[#1c1c26] hover:text-primary'" @click="switchView('list')">
      <span class="material-symbols-outlined" :class="activeView === 'list' ? 'fill-icon' : ''">list_alt</span>
      <span class="mt-1 font-headline text-[10px] uppercase tracking-widest" x-text="t('library')"></span>
    </button>

    <button type="button" data-testid="nav-favorites" class="flex scale-95 flex-col items-center justify-center rounded-2xl p-2 transition-all duration-300 active:scale-90" :class="activeView === 'favorites' ? 'bg-primary-container text-primary' : 'text-gray-500 hover:bg-[#1c1c26] hover:text-primary'" @click="switchView('favorites')">
      <span class="material-symbols-outlined" :class="activeView === 'favorites' ? 'fill-icon' : ''">favorite</span>
      <span class="mt-1 font-headline text-[10px] uppercase tracking-widest" x-text="t('favoritesNav')"></span>
    </button>

    <button type="button" data-testid="nav-settings" class="flex scale-95 flex-col items-center justify-center rounded-2xl p-2 transition-all duration-300 active:scale-90" :class="activeView === 'settings' ? 'bg-primary-container text-primary' : 'text-gray-500 hover:bg-[#1c1c26] hover:text-primary'" @click="switchView('settings')">
      <span class="material-symbols-outlined" :class="activeView === 'settings' ? 'fill-icon' : ''">settings</span>
      <span class="mt-1 font-headline text-[10px] uppercase tracking-widest" x-text="t('settingsNav')"></span>
    </button>
  </nav>
</body>
</html>
